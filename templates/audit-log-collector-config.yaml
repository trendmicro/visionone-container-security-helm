{{- if eq (include "container.security.deployAuditLogComponents" .) "true" }}
{{- include "container.security.validateEksConfig" . -}}
{{- include "container.security.validateAksConfig" . -}}
{{- include "container.security.validateGkeConfig" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "container.security.name" . }}-audit-log-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auditLogCollector.labels" . | nindent 4 }}
data:
  falco.yaml: |
    rules_files:
      - /etc/audit-log-collector/rbac_filter_rule.yaml

    # Run in userspace mode - no kernel driver needed for k8saudit plugin
    engine:
      kind: nodriver

    # Enable stdout output for debugging
    stdout_output:
      enabled: false

    # Enable gRPC output for audit-log-collector
    grpc_output:
      enabled: true

    grpc:
      enabled: true
      threadiness: 0
      bind_address: "unix:///var/run/audit-log-collector/audit-log-collector.sock"

    {{- if eq .Values.auditLogCollection.provider "eks" }}
    plugins:
      - name: k8saudit-eks
        library_path: libk8saudit-eks.so
        init_config:
          region: "{{ .Values.auditLogCollection.eks.region }}"
          profile: "default"
          shift: 10
          polling_interval: 10
          use_async: false
          buffer_size: 500
        open_params: "{{ .Values.auditLogCollection.eks.clusterName }}"
      - name: json
        library_path: libjson.so
        init_config: ""

    load_plugins: [k8saudit-eks, json]
    {{- else if eq .Values.auditLogCollection.provider "aks" }}
    plugins:
      - name: k8saudit-aks
        library_path: libk8saudit-aks.so
        init_config:
          event_hub_namespace_connection_string: "{{ .Values.auditLogCollection.aks.eventHubConnectionString }}"
          event_hub_name: "{{ .Values.auditLogCollection.aks.eventHubName }}"
          blob_storage_connection_string: "{{ .Values.auditLogCollection.aks.blobStorageConnectionString }}"
          blob_storage_container_name: "{{ .Values.auditLogCollection.aks.blobStorageContainerName }}"
          rate_limit_events_per_second: 100
          rate_limit_burst: 200
        open_params: ""
      - name: json
        library_path: libjson.so
        init_config: ""

    load_plugins: [k8saudit-aks, json]
    {{- else if eq .Values.auditLogCollection.provider "gke" }}
    plugins:
      - name: k8saudit-gke
        library_path: libk8saudit-gke.so
        init_config:
          project_id: "{{ .Values.auditLogCollection.gke.gcpProjectId }}"
          max_event_size: 8000000
        open_params: "{{ .Values.auditLogCollection.gke.pubSubSubscription }}"
      - name: json
        library_path: libjson.so
        init_config: ""

    load_plugins: [k8saudit-gke, json]
    {{- else }}
    plugins:
      - name: k8saudit
        library_path: libk8saudit.so
        init_config: ""
        open_params: "http://0.0.0.0:{{ .Values.visionOne.auditLogCollector.webhookPort }}/k8s-audit"
      - name: json
        library_path: libjson.so
        init_config: ""

    load_plugins: [k8saudit, json]
    {{- end }}

    # Ensure Falco waits for plugin events
    watch_config_files: false

  rbac_filter_rule.yaml: |
    - rule: RBAC Activity Detected
      desc: Detect any Kubernetes RBAC-related API activity
      condition: ka.target.resource in ("roles", "clusterroles", "rolebindings", "clusterrolebindings") and jevt.value[/stage]=ResponseComplete
      output: level=%jevt.value[/level] auditID=%ka.auditid stage=%ka.stage requestURI=%ka.uri verb=%ka.verb user.name=%ka.user.name user.groups=%ka.user.groups user.extra=%jevt.value[/user/extra] sourceIPs=%jevt.value[/sourceIPs] userAgent=%ka.useragent objectRef.resource=%ka.target.resource objectRef.namespace=%ka.target.namespace objectRef.name=%ka.target.name objectRef.apiGroup=%jevt.value[/objectRef/apiGroup] objectRef.apiVersion=%jevt.value[/objectRef/apiVersion] objectRef.subresource=%ka.target.subresource objectRef.uid=%jevt.value[/objectRef/uid] responseStatus.code=%ka.response.code responseStatus.reason=%ka.response.reason responseStatus.status=%jevt.value[/responseStatus/status] responseStatus.message=%jevt.value[/responseStatus/message] requestReceivedTimestamp=%jevt.value[/requestReceivedTimestamp] stageTimestamp=%jevt.value[/stageTimestamp] annotations.decision=%ka.auth.decision annotations.reason=%ka.auth.reason
      priority: NOTICE
      source: k8s_audit
      tags: [k8s, audit, rbac]
{{- end }}
