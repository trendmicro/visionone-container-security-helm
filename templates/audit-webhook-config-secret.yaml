{{- if eq (include "container.security.deployAuditLogComponents" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "container.security.name" . }}-audit-webhook-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apiServerModifier.labels" . | nindent 4 }}
type: Opaque
stringData:
  audit-webhook-config.yaml: |
    apiVersion: v1
    kind: Config
    clusters:
    - name: falco
      cluster:
        {{- if eq (include "container.security.deployForSelfManaged" .) "true" }}
        # selfManaged: use localhost since audit-log-collector runs on control plane with hostNetwork
        server: http://127.0.0.1:{{ .Values.visionOne.auditLogCollector.webhookPort }}/k8s-audit
        {{- else }}
        # Gardener: use short name (same namespace resolution)
        server: http://trendmicro-audit-log-collector:{{ .Values.visionOne.auditLogCollector.webhookPort }}/k8s-audit
        {{- end }}
    contexts:
    - context:
        cluster: falco
        user: ""
      name: default-context
    current-context: default-context
    preferences: {}
    users: []
{{- end }}
